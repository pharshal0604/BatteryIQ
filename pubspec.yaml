name: ev_fleet_app
description: EV Fleet Health Monitor for Endurance Technologies — Supervisor & Driver App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ──────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── Navigation ────────────────────────────────────────
  go_router: ^14.0.0

  # ── HTTP Client ───────────────────────────────────────
  dio: ^5.4.3

  # ── Environment Variables ─────────────────────────────
  flutter_dotenv: ^5.2.1

  # ── Charts & Visualization ────────────────────────────
  fl_chart: ^0.69.0

  # ── Local Notifications (Free Alert System) ───────────
  flutter_local_notifications: ^21.0.0

  # ── Skeleton Loaders ──────────────────────────────────
  shimmer: ^3.0.0

  # ── Immutable Models ──────────────────────────────────
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - .env